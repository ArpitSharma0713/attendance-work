<html>
<head>
    <meta charset="UTF-8">
    <title>Attendance Calculator</title>
    <link rel="stylesheet" href="attendance_cal.css">
</head>
<body>
    <h1 class="heading">Attendance Calculator</h1>
    <div>
        <div class="input-group">
        <label for="totalClasses">Total Classes:</label>
        <input type="number"  id="totalClasses" name="totalClasses"><br><br>
        </div>
        <div class="input-group">
        <label for="attendedClasses">Attended Classes:</label>
        <input type="number" id="attendedClasses" name="attendedClasses"><br><br>
        </div>
        <div class="input-group">
        <label for="requiredAttendance">Required Attendance:</label>
        <input type="number" id="requiredAttendance" name="requiredAttendance" min="60" max="100"><br><br>
        </div>
        <div class="input-group">
        </div>
        <button onclick="calculateAttendance()" class="calculate_button">Calculate Attendance</button><br><br>

        <div id="result" class="output"></div>
        <script src="attendance_cal.js">
        </script>
    </div>
    
</body>
</html>
